<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Busca Tumbas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: var(--bg);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden; /* Prevent scroll on splash/auth screens */
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container-main {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            overflow-y: auto; /* Allow scrolling for main content */
            height: 100%;
            box-sizing: border-box;
            display: none; /* Hidden by default, shown after auth */
        }

        .card-custom {
            background: white;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 20px rgba(15,23,42,0.08);
        }

        .form-control, .form-select {
            padding: 0.8rem 1rem;
            font-size: 0.95rem;
            border-radius: 14px;
            border: 2px solid #f1f5f9;
            background: #fff;
            color: var(--primary);
        }

        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59,130,246,0.1);
            outline: none;
        }

        .btn-primary {
            background: var(--accent);
            border: none;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            color: white;
        }

        .btn-success {
            background: var(--success);
            border: none;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            color: white;
        }

        .btn-outline-secondary {
            border: 1px solid #e2e8f0;
            color: var(--primary);
        }

        .btn-outline-secondary:hover {
            background: #f1f5f9;
        }

        #output-area {
            background: #f1f5f9;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            padding: 15px;
            min-height: 120px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #0f172a;
        }

        #output-area.empty {
            color: #94a3b8;
            font-style: italic;
        }

        .scan-result-item {
            background: white;
            border-left: 4px solid var(--accent);
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 0.85rem;
            line-height: 1.5;
            word-wrap: break-word; /* Ensure text breaks within the item */
        }

        /* SPLASH SCREEN */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            z-index: 50000;
            opacity: 1;
            transition: opacity 0.5s ease-out;
        }
        #splash-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* AUTH SCREEN */
        #auth-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 40000;
            display: none; /* Hidden by default, shown after splash */
        }
        #auth-screen .card-custom {
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        #auth-screen h5 {
            color: var(--primary);
            margin-bottom: 20px;
        }

        /* SCANNER MODAL */
        #ia-modal {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: none;
            flex-direction: column;
        }

        #cam-preview-ia {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scan-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 82%;
            aspect-ratio: 4/3;
            border: 2px solid rgba(0,229,192,0.6);
            border-radius: 16px;
            pointer-events: none;
            z-index: 20;
        }

        .scan-guide::before, .scan-guide::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            border-color: #00e5c0;
            border-style: solid;
        }

        .scan-guide::before {
            top: -2px;
            left: -2px;
            border-width: 3px 0 0 3px;
            border-radius: 4px 0 0 0;
        }

        .scan-guide::after {
            bottom: -2px;
            right: -2px;
            border-width: 0 3px 3px 0;
            border-radius: 0 0 4px 0;
        }

        #cam-top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 20;
            padding: 40px 18px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #snap-btn {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: white;
            border: 5px solid rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        #snap-btn:hover {
            background: #f0f0f0;
        }

        /* RESULT MODAL */
        #result-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 20000;
            display: none;
            align-items: flex-end;
            justify-content: center;
            padding: 16px;
        }

        #result-panel {
            background: white;
            border-radius: 24px;
            padding: 22px;
            width: 100%;
            max-width: 420px;
        }

        .toast-msg {
            position: fixed;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30000;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.8rem;
            display: none;
            color: white;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            max-width: 88%;
            text-align: center;
        }

        /* API KEY MODAL */
        #key-config-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 25000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        label.text-uppercase {
            font-size: 0.65rem;
            margin-bottom: 4px;
            font-weight: 800;
            color: #94a3b8;
            display: block;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div id="toast-msg" class="toast-msg"></div>

<!-- SPLASH SCREEN -->
<div id="splash-screen">
    BUSCA TUMBAS
</div>

<!-- AUTH SCREEN -->
<div id="auth-screen">
    <div class="card-custom">
        <h5 class="fw-bold mb-4">Bienvenido a Busca Tumbas</h5>
        <input type="email" id="auth-email" class="form-control mb-2" placeholder="Correo electrónico">
        <input type="password" id="auth-password" class="form-control mb-3" placeholder="Contraseña">
        <button class="btn btn-primary w-100 py-2 rounded-pill fw-bold mb-2" onclick="handleAuth(true)">INICIAR SESIÓN</button>
        <button class="btn btn-outline-secondary w-100 py-2 rounded-pill fw-bold" onclick="handleAuth(false)">REGISTRARSE</button>
        <button class="btn btn-link text-danger mt-3" onclick="logout()" id="logout-btn" style="display:none;">Cerrar Sesión</button>
    </div>
</div>

<!-- API KEY MODAL -->
<div id="key-config-modal">
    <div class="card-custom" style="max-width:350px; text-align:center;">
        <h6 class="fw-bold mb-3">⚙ CONFIGURAR ESCÁNER</h6>
        <p style="font-size:0.7rem;" class="text-muted mb-3">
            Ingresa tu API Key de Google Gemini.<br>Se guarda solo en este dispositivo.<br><br>
            Obtén la tuya gratis en<br>
            <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--accent);">aistudio.google.com/app/apikey</a>
        </p>
        <input type="password" id="user-gemini-key" class="form-control mb-3" placeholder="AIzaSy...">
        <button class="btn btn-primary w-100 rounded-pill fw-bold" onclick="saveGeminiKey()">GUARDAR KEY</button>
    </div>
</div>

<!-- RESULT MODAL -->
<div id="result-modal">
    <div id="result-panel">
        <p class="fw-bold mb-3" style="font-size:0.7rem; color:#94a3b8; letter-spacing:1px;">TEXTO EXTRAÍDO</p>
        <textarea id="result-text" class="form-control mb-3" rows="6" readonly style="resize:none; font-family:'Courier New',monospace;"></textarea>
        <button class="btn btn-success w-100 rounded-pill fw-bold mb-2" onclick="copyResultText()">
            <i class="fas fa-copy me-2"></i>COPIAR TEXTO
        </button>
        <button class="btn btn-primary w-100 rounded-pill fw-bold mb-2" onclick="addToOutput()">
            <i class="fas fa-plus me-2"></i>AGREGAR AL HISTORIAL
        </button>
        <button class="btn btn-outline-secondary w-100 rounded-pill" onclick="closeResult()" style="border:none;">
            ✕ CERRAR
        </button>
    </div>
</div>

<!-- SCANNER MODAL -->
<div id="ia-modal">
    <video id="cam-preview-ia" autoplay playsinline muted></video>
    <div class="scan-guide"></div>
    <div id="cam-top-bar">
        <button class="btn btn-sm rounded-pill" style="background:rgba(0,0,0,0.5); color:white; border:1px solid rgba(255,255,255,0.3);" onclick="closeScanner()">✕ SALIR</button>
        <button class="btn btn-sm rounded-pill" style="background:rgba(0,0,0,0.5); color:#fbbf24; border:1px solid rgba(255,255,255,0.2); font-size:0.65rem;" onclick="changeGeminiKey()">⚙ API KEY</button>
    </div>
    <div id="snap-btn" onclick="captureIA()">
        <i class="fas fa-camera fa-2x text-primary" id="snap-icon"></i>
    </div>
</div>

<!-- MAIN INTERFACE -->
<div class="container-main" id="main-app">
    <div class="card-custom">
        <h5 class="fw-bold mb-4 text-center" style="color:var(--primary);">
            <i class="fas fa-image me-2" style="color:var(--accent);"></i>Escáner de Tumbas
        </h5>
        <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold mb-3" onclick="openScannerModal()">
            <i class="fas fa-camera me-2"></i>ABRIR CÁMARA
        </button>
        <input type="file" id="image-upload-input" accept="image/*" style="display:none;" onchange="handleImageUpload(event)">
        <button class="btn btn-outline-secondary w-100 py-3 rounded-pill fw-bold" onclick="document.getElementById('image-upload-input').click()">
            <i class="fas fa-upload me-2"></i>SUBIR ARCHIVO
        </button>
    </div>

    <div class="card-custom">
        <h6 class="fw-bold mb-3" style="color:var(--primary);">Historial de Escaneos</h6>
        <div id="output-area" class="empty">
            Aquí aparecerá el texto de tus escaneos...
        </div>
        <button class="btn btn-outline-secondary w-100 rounded-pill mt-3" onclick="clearOutput()">
            <i class="fas fa-trash me-2"></i>LIMPIAR HISTORIAL
        </button>
    </div>
</div>


<script>
/* ══════════════════════════════════════════════════════════════════
   CONFIGURACIÓN FIREBASE
══════════════════════════════════════════════════════════════════ */
const firebaseConfig = {
    apiKey: "AIzaSyDVjbcOjDr8o3yiNqbwPW3W6WhIsplGUUk",
    authDomain: "buscatumbas-2e7cc.firebaseapp.com",
    projectId: "buscatumbas-2e7cc",
    storageBucket: "buscatumbas-2e7cc.firebasestorage.app",
    messagingSenderId: "920637749030",
    appId: "1:920637749030:web:21568d7680f12946fdf3e7"
};

// Inicializar Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* ══════════════════════════════════════════════════════════════════
   ESTADO GLOBAL
══════════════════════════════════════════════════════════════════ */
let scannerStream = null;
let pendingScannedText = '';
let pendingCanvas = null;
let outputArray = [];
let currentGeolocation = null; // Para guardar la ubicación actual

/* ══════════════════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════════════════ */
const showToast = (msg, color = '#10b981') => {
    const el = document.getElementById('toast-msg');
    el.textContent = msg;
    el.style.background = color;
    el.style.display = 'block';
    clearTimeout(el._t);
    el._t = setTimeout(() => el.style.display = 'none', 3000);
};

/* ══════════════════════════════════════════════════════════════════
   GEOLOCALIZACIÓN
══════════════════════════════════════════════════════════════════ */
function getGeolocation() {
    return new Promise((resolve) => {
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    resolve({
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude
                    });
                },
                (error) => {
                    console.error("Error getting geolocation:", error);
                    showToast('❌ Error de geolocalización', '#f59e0b');
                    resolve(null);
                },
                { enableHighAccuracy: false, timeout: 5000, maximumAge: 0 }
            );
        } else {
            showToast('❌ Geolocalización no soportada', '#f59e0b');
            resolve(null);
        }
    });
}


/* ══════════════════════════════════════════════════════════════════
   API KEY MANAGEMENT
══════════════════════════════════════════════════════════════════ */
function saveGeminiKey() {
    const val = document.getElementById('user-gemini-key').value.trim();
    if (val && val.length > 10) {
        localStorage.setItem('yaute_key_v3310', val);
        document.getElementById('key-config-modal').style.display = 'none';
        showToast('✅ Key guardada correctamente');
    } else {
        showToast('⚠ Key inválida', '#ef4444');
    }
}

function changeGeminiKey() {
    document.getElementById('user-gemini-key').value = localStorage.getItem('yaute_key_v3310') || '';
    document.getElementById('key-config-modal').style.display = 'flex';
}

function checkApiKey() {
    if (!localStorage.getItem('yaute_key_v3310')) {
        document.getElementById('key-config-modal').style.display = 'flex';
        return false;
    }
    return true;
}

/* ══════════════════════════════════════════════════════════════════
   SCANNER CAMERA
══════════════════════════════════════════════════════════════════ */
async function openScannerModal() {
    if (!checkApiKey()) return;
    document.getElementById('ia-modal').style.display = 'flex';
    try {
        scannerStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
        });
        document.getElementById('cam-preview-ia').srcObject = scannerStream;
        currentGeolocation = await getGeolocation(); // Obtener ubicación al abrir la cámara
    } catch(e) {
        showToast('❌ Error de cámara: ' + e.message, '#ef4444');
        closeScanner();
    }
}

function closeScanner() {
    if (scannerStream) scannerStream.getTracks().forEach(t => t.stop());
    scannerStream = null;
    document.getElementById('ia-modal').style.display = 'none';
}

/* ══════════════════════════════════════════════════════════════════
   CAPTURE AND ORIENTATION CORRECTION
══════════════════════════════════════════════════════════════════ */
function captureOrientado(video) {
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const c = document.createElement('canvas');
    const ctx = c.getContext('2d');

    if (vh >= vw) {
        // Ya es portrait
        c.width = vw;
        c.height = vh;
        ctx.drawImage(video, 0, 0);
    } else {
        // Landscape → rotar 90° a portrait
        c.width = vh;
        c.height = vw;
        ctx.translate(c.width / 2, c.height / 2);
        ctx.rotate(Math.PI / 2);
        ctx.drawImage(video, -vw / 2, -vh / 2, vw, vh);
    }
    return c;
}

/* ══════════════════════════════════════════════════════════════════
   IMAGE UPLOAD
══════════════════════════════════════════════════════════════════ */
async function handleImageUpload(event) {
    if (!checkApiKey()) return;

    const file = event.target.files[0];
    if (!file) return;

    if (!file.type.startsWith('image/')) {
        showToast('⚠ Por favor, sube un archivo de imagen.', '#f59e0b');
        return;
    }

    const reader = new FileReader();
    reader.onload = async (e) => {
        const img = new Image();
        img.onload = async () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // Resize image if too large to avoid memory issues and API limits
            const MAX_DIM = 1920;
            let width = img.width;
            let height = img.height;

            if (width > height) {
                if (width > MAX_DIM) {
                    height *= MAX_DIM / width;
                    width = MAX_DIM;
                }
            } else {
                if (height > MAX_DIM) {
                    width *= MAX_DIM / height;
                    height = MAX_DIM;
                }
            }
            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);
            
            pendingCanvas = canvas;
            currentGeolocation = await getGeolocation(); // Obtener ubicación al subir archivo
            const b64 = canvas.toDataURL('image/jpeg', 0.88).split(',')[1];
            await processImageWithGemini(b64, null); // Pass null for snapIcon as it's not a camera capture
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}


/* ══════════════════════════════════════════════════════════════════
   CAPTURE + GEMINI OCR
══════════════════════════════════════════════════════════════════ */
async function captureIA() {
    const video = document.getElementById('cam-preview-ia');
    if (!video.srcObject || video.videoWidth === 0) {
        showToast('⚠ Cámara no lista', '#f59e0b');
        return;
    }

    pendingCanvas = captureOrientado(video);
    const b64 = pendingCanvas.toDataURL('image/jpeg', 0.88).split(',')[1];

    const snapIcon = document.getElementById('snap-icon');
    await processImageWithGemini(b64, snapIcon);
    closeScanner(); // Close scanner only after processing
}

async function processImageWithGemini(base64Image, snapIconElement) {
    const key = localStorage.getItem('yaute_key_v3310');
    if (!key) {
        changeGeminiKey();
        return;
    }

    if (snapIconElement) {
        snapIconElement.className = 'fas fa-spinner fa-spin fa-2x text-primary';
        document.getElementById('snap-btn').style.pointerEvents = 'none';
    } else {
        showToast('Cargando y escaneando imagen...', 'rgba(59,130,246,0.9)');
    }


    try {
        const promptText = `
            Extrae la siguiente información de la imagen de una lápida o documento fúnebre.
            Si un dato no está presente o no es claro, usa null.
            Formato de salida JSON:
            {
                "nombre_finado": "string | null",
                "fecha_nacimiento": "YYYY-MM-DD | null",
                "fecha_defuncion": "YYYY-MM-DD | null",
                "nombre_panteon": "string | null"
            }
            Si no puedes extraer nada de lo anterior, devuelve el texto crudo extraído de la imagen como una cadena de texto sin formato JSON.
        `;

        const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro-vision:generateContent?key=${key}`, // Using gemini-pro-vision for better image understanding
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { inline_data: { mime_type: 'image/jpeg', data: base64Image } },
                            { text: promptText }
                        ]
                    }],
                    generationConfig: { temperature: 0.3, maxOutputTokens: 1000 }
                })
            }
        );

        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);

        let extractedText = data.candidates[0].content.parts[0].text.trim();
        pendingScannedText = extractedText;
        
        showResultModal();

    } catch(e) {
        showToast('❌ Error IA: ' + e.message, '#ef4444');
    } finally {
        if (snapIconElement) {
            snapIconElement.className = 'fas fa-camera fa-2x text-primary';
            document.getElementById('snap-btn').style.pointerEvents = 'auto';
        }
        document.getElementById('image-upload-input').value = ''; // Clear file input
    }
}


/* ══════════════════════════════════════════════════════════════════
   RESULT MODAL
══════════════════════════════════════════════════════════════════ */
function showResultModal() {
    document.getElementById('result-text').value = pendingScannedText;
    document.getElementById('result-modal').style.display = 'flex';
}

function closeResult() {
    document.getElementById('result-modal').style.display = 'none';
    pendingScannedText = '';
    pendingCanvas = null;
    currentGeolocation = null;
}

function copyResultText() {
    const text = document.getElementById('result-text').value;
    navigator.clipboard.writeText(text).then(() => {
        showToast('✅ Texto copiado');
    }).catch(() => {
        showToast('⚠ No se pudo copiar', '#f59e0b');
    });
}

function addToOutput() {
    const text = document.getElementById('result-text').value;
    if (!text.trim()) {
        showToast('⚠ Texto vacío', '#f59e0b');
        return;
    }

    let parsedData = {
        nombre_finado: null,
        fecha_nacimiento: null,
        fecha_defuncion: null,
        nombre_panteon: null,
        raw_text: text
    };

    try {
        const jsonMatch = text.match(/\{[\s\S]*\}/);
        if (jsonMatch) {
            const data = JSON.parse(jsonMatch[0]);
            parsedData.nombre_finado = data.nombre_finado || null;
            parsedData.fecha_nacimiento = data.fecha_nacimiento || null;
            parsedData.fecha_defuncion = data.fecha_defuncion || null;
            parsedData.nombre_panteon = data.nombre_panteon || null;
        }
    } catch (e) {
        console.warn("Could not parse JSON from Gemini output, using raw text.", e);
    }

    outputArray.push({
        timestamp: new Date().toLocaleString(),
        geolocation: currentGeolocation,
        data: parsedData
    });

    updateOutput();
    showToast('✅ Agregado al historial');
    closeResult();
}

/* ══════════════════════════════════════════════════════════════════
   OUTPUT MANAGEMENT
══════════════════════════════════════════════════════════════════ */
function updateOutput() {
    const outputArea = document.getElementById('output-area');
    
    if (outputArray.length === 0) {
        outputArea.innerHTML = '';
        outputArea.className = 'empty';
        outputArea.textContent = 'Aquí aparecerá el texto de tus escaneos...';
        return;
    }

    outputArea.className = '';
    outputArea.innerHTML = outputArray.map((item, idx) => {
        const data = item.data;
        let content = '';

        if (data.nombre_finado || data.fecha_nacimiento || data.fecha_defuncion || data.nombre_panteon) {
            content += `<strong>Finado:</strong> ${data.nombre_finado || 'N/A'}<br>`;
            content += `<strong>Nacimiento:</strong> ${data.fecha_nacimiento || 'N/A'}<br>`;
            content += `<strong>Defunción:</strong> ${data.fecha_defuncion || 'N/A'}<br>`;
            content += `<strong>Panteón:</strong> ${data.nombre_panteon || 'N/A'}<br>`;
        } else {
            content += `<strong>Texto Completo:</strong><br>${data.raw_text.replace(/</g, '&lt;').replace(/>/g, '&gt;')}<br>`;
        }

        if (item.geolocation) {
            content += `<strong>Ubicación:</strong> Lat: ${item.geolocation.latitude.toFixed(4)}, Long: ${item.geolocation.longitude.toFixed(4)}`;
        }

        return `
            <div class="scan-result-item">
                <div style="color:#94a3b8; font-size:0.75rem; margin-bottom:8px;">
                    <strong>#${idx + 1}</strong> — ${item.timestamp}
                </div>
                <div style="color:#0f172a; white-space:pre-wrap; word-break:break-word;">
                    ${content}
                </div>
            </div>
        `;
    }).join('');
}

function clearOutput() {
    if (outputArray.length === 0) {
        showToast('⚠ Historial vacío', '#f59e0b');
        return;
    }
    if (confirm('¿Deseas borrar todo el historial de escaneos?')) {
        outputArray = [];
        updateOutput();
        showToast('✅ Historial limpiado');
    }
}

/* ══════════════════════════════════════════════════════════════════
   FIREBASE AUTHENTICATION
══════════════════════════════════════════════════════════════════ */
async function handleAuth(isLogin) {
    const email = document.getElementById('auth-email').value;
    const password = document.getElementById('auth-password').value;

    if (!email || !password) {
        showToast('⚠ Por favor, ingresa email y contraseña', '#f59e0b');
        return;
    }

    try {
        if (isLogin) {
            await auth.signInWithEmailAndPassword(email, password);
            showToast('✅ Sesión iniciada correctamente');
        } else {
            await auth.createUserWithEmailAndPassword(email, password);
            showToast('✅ Registro exitoso. ¡Bienvenido!');
        }
    } catch (error) {
        console.error("Firebase Auth Error:", error);
        let msg = "Error de autenticación.";
        if (error.code === 'auth/email-already-in-use') {
            msg = 'El correo ya está en uso. Intenta iniciar sesión.';
        } else if (error.code === 'auth/invalid-email') {
            msg = 'Formato de correo electrónico inválido.';
        } else if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
            msg = 'Credenciales inválidas.';
        } else if (error.code === 'auth/weak-password') {
            msg = 'La contraseña debe tener al menos 6 caracteres.';
        }
        showToast(`❌ ${msg}`, '#ef4444');
    }
}

function logout() {
    auth.signOut().then(() => {
        showToast('✅ Sesión cerrada correctamente');
    }).catch((error) => {
        console.error("Firebase Sign Out Error:", error);
        showToast('❌ Error al cerrar sesión', '#ef4444');
    });
}


/* ══════════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════════ */
window.onload = () => {
    // Show splash screen first
    document.getElementById('splash-screen').style.display = 'flex';
    setTimeout(() => {
        document.getElementById('splash-screen').classList.add('hidden');
        setTimeout(() => {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex'; // Show auth screen after splash
        }, 500); // Wait for transition
    }, 2500); // Show splash for 2.5 seconds

    // Firebase Auth State Listener
    auth.onAuthStateChanged((user) => {
        if (user) {
            // User is signed in
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('logout-btn').style.display = 'block'; // Show logout button in auth screen for convenience
            checkApiKey(); // Prompt for Gemini key if not set
        } else {
            // User is signed out
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('key-config-modal').style.display = 'none'; // Hide key modal if user logs out
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('logout-btn').style.display = 'none';
        }
    });
};
</script>
