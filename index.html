<!DOCTYPE html>
<html lang="es">
<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Firebase SDKs -->

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;

            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden; /* Prevent scroll on splash/auth screens */

        body {

            align-items: center;
            justify-content: center;
        }

        .container-main {

            flex-direction: column;
            gap: 20px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            overflow-y: auto; /* Allow scrolling for main content */
            height: 100%;
            box-sizing: border-box;
            display: none; /* Hidden by default, shown after auth */
            position: relative; /* Needed for absolute positioning of logout button */
        }

        .card-custom {
            background: white;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 20px rgba(15,23,42,0.08);

            font-size: 0.95rem;
            border-radius: 14px;
            border: 2px solid #f1f5f9;
            background: #fff;
            color: var(--primary);

        .form-control:focus {

        .btn-primary {
            background: var(--accent);
            border: none;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            color: white;
        }

        .btn-success {
            background: var(--success);
            border: none;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            color: white;
        }

        .btn-outline-secondary {
            border: 1px solid #e2e8f0;
            color: var(--primary);
        }

        .btn-outline-secondary:hover {
            background: #f1f5f9;
        }

        /* SPLASH SCREEN */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            z-index: 50000;
            opacity: 1;
            transition: opacity 0.5s ease-out;

        #splash-screen.hidden {
            opacity: 0;

        #splash-screen .version-text {

            font-weight: normal;
            margin-top: 10px;
            color: rgba(255,255,255,0.8);
        }

        /* AUTH SCREEN */
        #auth-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 40000;
            display: none; /* Hidden by default, shown after splash */

        #auth-screen .card-custom {
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        #auth-screen h5 {
            color: var(--primary);
            margin-bottom: 20px;
        }

        /* Password input group styling */
        .input-group {
            display: flex;
            align-items: stretch;
            border-radius: 14px;
            border: 2px solid #f1f5f9;
            overflow: hidden;
            background-color: #fff; /* Ensure consistent background */

        .input-group .form-control {
            border: none; /* Remove individual border from input */
            padding: 0.8rem 1rem;
            height: auto;
            flex-grow: 1;
            box-shadow: none; /* Remove default form-control shadow */

        .input-group .form-control:focus {
            box-shadow: none; /* Remove individual focus shadow */

        }

            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59,130,246,0.1);
        }
        .input-group > .btn {
            border: none; /* Remove individual border from button */
            background-color: #fff; /* Match input background */
            color: var(--primary); /* Match input text color */

            box-shadow: none; /* Remove default button shadow */

            background-color: #f1f5f9; /* Subtle hover effect */

        .form-label {

        #ia-modal {
            position: fixed;
            inset: 0;

            z-index: 10000;
            display: none;
            flex-direction: column;
        }

        #cam-preview-ia {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;

        }

            top: 50%;

        .scan-guide::before, .scan-guide::after {

        .scan-guide::before {

            left: -2px;

            border-radius: 4px 0 0 0;
        }

        .scan-guide::after {
            bottom: -2px;
            right: -2px;

            border-radius: 0 0 4px 0;

        #cam-top-bar {

            top: 0;

        #snap-btn {

<script>
/* ══════════════════════════════════════════════════════════════════
   CONFIGURACIÓN DE LA APLICACIÓN
══════════════════════════════════════════════════════════════════ */
const APP_VERSION = "v1.0.0"; // Definir la versión de la aplicación aquí

/* ══════════════════════════════════════════════════════════════════
   CONFIGURACIÓN FIREBASE
══════════════════════════════════════════════════════════════════ */
const firebaseConfig = {
    apiKey: "AIzaSyDVjbcOjDr8o3yiNqbwPW3W6WhIsplGUUk",
    authDomain: "buscatumbas-2e7cc.firebaseapp.com",
    projectId: "buscatumbas-2e7cc",
    storageBucket: "buscatumbas-2e7cc.firebasestorage.app",
    messagingSenderId: "920637749030",
    appId: "1:920637749030:web:21568d7680f12946fdf3e7"
};

// Inicializar Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* ══════════════════════════════════════════════════════════════════
   ESTADO GLOBAL
══════════════════════════════════════════════════════════════════ */
let scannerStream = null;
let pendingScannedText = '';
let pendingCanvas = null;
let outputArray = []; // Keep internal array for potential future "view all history" feature
let currentGeolocation = null; // Para guardar la ubicación actual

// Original text for auth buttons to restore after loading
let originalLoginBtnText = 'INICIAR SESIÓN';
let originalRegisterBtnText = 'REGISTRARSE';


/* ══════════════════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════════════════ */
const showToast = (msg, color = '#10b981', duration = 3000) => {
    const el = document.getElementById('toast-msg');
    el.textContent = msg;
    el.style.background = color;
    el.style.display = 'block';
    clearTimeout(el._t);
    el._t = setTimeout(() => el.style.display = 'none', duration);
};

/* ══════════════════════════════════════════════════════════════════
   GEOLOCALIZACIÓN
══════════════════════════════════════════════════════════════════ */
function getGeolocation() {
    return new Promise((resolve) => {
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    resolve({
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude
                    });
                },
                (error) => {
                    console.error("Error getting geolocation:", error);
                    showToast('❌ Error de geolocalización', '#f59e0b');
                    resolve(null);
                },
                { enableHighAccuracy: false, timeout: 5000, maximumAge: 0 }
            );
        } else {
            showToast('❌ Geolocalización no soportada', '#f59e0b');
            resolve(null);
        }
    });
}


/* ══════════════════════════════════════════════════════════════════
   API KEY MANAGEMENT
══════════════════════════════════════════════════════════════════ */

// Checks if the Gemini API key is set in localStorage
function isGeminiKeySet() {
    return !!localStorage.getItem('yaute_key_v3310');
}

// Opens the API key configuration modal
function changeGeminiKey() {
    document.getElementById('user-gemini-key').value = localStorage.getItem('yaute_key_v3310') || '';
    document.getElementById('key-config-modal').style.display = 'flex';
}

// Closes the API key configuration modal
function closeGeminiKeyModal() {
    document.getElementById('key-config-modal').style.display = 'none';
}

// Saves the Gemini API key
function saveGeminiKey() {
    const val = document.getElementById('user-gemini-key').value.trim();
    if (val && val.length > 10) {
        localStorage.setItem('yaute_key_v3310', val);
        closeGeminiKeyModal(); // Use the new close function
        showToast('✅ Key guardada correctamente');
    } else {
        showToast('⚠ Key inválida', '#ef4444');
    }
}

/* ══════════════════════════════════════════════════════════════════
   SCANNER CAMERA
══════════════════════════════════════════════════════════════════ */
async function openScannerModal() {
    // Check API Key before proceeding
    if (!isGeminiKeySet()) {
        changeGeminiKey(); // Show the API Key modal
        showToast('⚠ Primero guarda tu API Key de Gemini.', '#f59e0b');
        return;
    }

    document.getElementById('ia-modal').style.display = 'flex';
    try {
        scannerStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
        });
        document.getElementById('cam-preview-ia').srcObject = scannerStream;
        currentGeolocation = await getGeolocation(); // Obtener ubicación al abrir la cámara
    } catch(e) {
        showToast('❌ Error de cámara: ' + e.message, '#ef4444');
        closeScanner();
    }
}

function closeScanner() {
    if (scannerStream) scannerStream.getTracks().forEach(t => t.stop());
    scannerStream = null;
    document.getElementById('ia-modal').style.display = 'none';
}

/* ══════════════════════════════════════════════════════════════════
   CAPTURE AND ORIENTATION CORRECTION
══════════════════════════════════════════════════════════════════ */
function captureOrientado(video) {
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const c = document.createElement('canvas');
    const ctx = c.getContext('2d');

    if (vh >= vw) {
        // Ya es portrait
        c.width = vw;
        c.height = vh;
        ctx.drawImage(video, 0, 0);
    } else {
        // Landscape → rotar 90° a portrait
        c.width = vh;
        c.height = vw;
        ctx.translate(c.width / 2, c.height / 2);
        ctx.rotate(Math.PI / 2);
        ctx.drawImage(video, -vw / 2, -vh / 2, vw, vh);
    }
    return c;
}

/* ══════════════════════════════════════════════════════════════════
   IMAGE UPLOAD
══════════════════════════════════════════════════════════════════ */
async function handleImageUpload(event) {
    // Check API Key before proceeding
    if (!isGeminiKeySet()) {
        changeGeminiKey(); // Show the API Key modal
        showToast('⚠ Primero guarda tu API Key de Gemini.', '#f59e0b');
        event.target.value = ''; // Clear file input
        return;
    }

    const file = event.target.files[0];
    if (!file) return;

    if (!file.type.startsWith('image/')) {
        showToast('⚠ Por favor, sube un archivo de imagen.', '#f59e0b');
        event.target.value = ''; // Clear file input
        return;
    }

    const reader = new FileReader();
    reader.onload = async (e) => {
        const img = new Image();
        img.onload = async () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // Resize image if too large to avoid memory issues and API limits
            const MAX_DIM = 1920;
            let width = img.width;
            let height = img.height;

            if (width > height) {
                if (width > MAX_DIM) {
                    height *= MAX_DIM / width;
                    width = MAX_DIM;
                }
            } else {
                if (height > MAX_DIM) {
                    width *= MAX_DIM / height;
                    height = MAX_DIM;
                }
            }
            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);
            
            pendingCanvas = canvas;
            currentGeolocation = await getGeolocation(); // Obtener ubicación al subir archivo
            const b64 = canvas.toDataURL('image/jpeg', 0.88).split(',')[1];
            await processImageWithGemini(b64, null); // Pass null for snapIcon as it's not a camera capture
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}


/* ══════════════════════════════════════════════════════════════════
   CAPTURE + GEMINI OCR
══════════════════════════════════════════════════════════════════ */
async function captureIA() {
    const video = document.getElementById('cam-preview-ia');
    if (!video.srcObject || video.videoWidth === 0) {
        showToast('⚠ Cámara no lista', '#f59e0b');
        return;
    }

    pendingCanvas = captureOrientado(video);
    const b64 = pendingCanvas.toDataURL('image/jpeg', 0.88).split(',')[1];

    const snapIcon = document.getElementById('snap-icon');
    await processImageWithGemini(b64, snapIcon);
    closeScanner(); // Close scanner only after processing
}

async function processImageWithGemini(base64Image, snapIconElement) {
    const key = localStorage.getItem('yaute_key_v3310');
    if (!key) {
        changeGeminiKey(); 
        showToast('⚠ API Key de Gemini no encontrada.', '#ef4444');
        return;
    }

    if (snapIconElement) {
        snapIconElement.className = 'fas fa-spinner fa-spin fa-2x text-primary';
        document.getElementById('snap-btn').style.pointerEvents = 'none';
    } else {
        showToast('Cargando y escaneando imagen...', 'rgba(59,130,246,0.9)');
    }


    try {
        const promptText = `
            Extrae la siguiente información de la imagen de una lápida o documento fúnebre.
            Si un dato no está presente o no es claro, usa null.
            Formato de salida JSON:
            {
                "nombre_finado": "string | null",
                "fecha_nacimiento": "YYYY-MM-DD | null",
                "fecha_defuncion": "YYYY-MM-DD | null",
                "nombre_panteon": "string | null"
            }
            Si no puedes extraer nada de lo anterior, devuelve el texto crudo extraído de la imagen como una cadena de texto sin formato JSON.
        `;

        const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${key}`, // Usando gemini-2.5-flash-lite
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { inline_data: { mime_type: 'image/jpeg', data: base64Image } },
                            { text: promptText }
                        ]
                    }],
                    generationConfig: { temperature: 0.3, maxOutputTokens: 1000 }
                })
            }
        );

        const data = await res.json();
        if (!res.ok) {
            // Specific error handling for model not found / unsupported
            if (data.error && data.error.message.includes("models/gemini-2.5-flash-lite is not found") || 
                data.error && data.error.message.includes("is not supported for generateContent")) {
                throw new Error("El modelo Gemini 'gemini-2.5-flash-lite' no está disponible o accesible con tu API Key. Por favor, verifica tu API Key en Google AI Studio y asegúrate de que tenga los permisos necesarios para acceder a este modelo.");
            }
            throw new Error(data.error?.message || `HTTP ${res.status}`);
        }

        pendingScannedText = data.candidates[0].content.parts[0].text.trim();
        
        showResultModal();

    } catch(e) {
        showToast('❌ Error IA: ' + e.message, '#ef4444', 6000); // Longer toast for important errors
    } finally {
        if (snapIconElement) {
            snapIconElement.className = 'fas fa-camera fa-2x text-primary';
            document.getElementById('snap-btn').style.pointerEvents = 'auto';
        }
        document.getElementById('image-upload-input').value = ''; // Clear file input
    }
}


/* ══════════════════════════════════════════════════════════════════
   RESULT MODAL
══════════════════════════════════════════════════════════════════ */
function showResultModal() {
    document.getElementById('result-text').value = pendingScannedText;
    document.getElementById('result-modal').style.display = 'flex';
}

function closeResult() {
    document.getElementById('result-modal').style.display = 'none';
    pendingScannedText = '';
    pendingCanvas = null;
    currentGeolocation = null;
}

function copyResultText() {
    const text = document.getElementById('result-text').value;
    navigator.clipboard.writeText(text).then(() => {
        showToast('✅ Texto copiado');
    }).catch(() => {
        showToast('⚠ No se pudo copiar', '#f59e0b');
    });
}

function addToOutput() {
    const text = document.getElementById('result-text').value;
    if (!text.trim()) {
        showToast('⚠ Texto vacío', '#f59e0b');
        return;
    }

    let parsedData = {
        nombre_finado: '',
        fecha_nacimiento: '',
        fecha_defuncion: '',
        nombre_panteon: '',
        raw_text: text
    };

    try {
        const jsonMatch = text.match(/\{[\s\S]*\}/);
        if (jsonMatch) {
            const data = JSON.parse(jsonMatch[0]);
            parsedData.nombre_finado = data.nombre_finado || '';
            parsedData.fecha_nacimiento = data.fecha_nacimiento || '';
            parsedData.fecha_defuncion = data.fecha_defuncion || '';
            parsedData.nombre_panteon = data.nombre_panteon || '';
        }
    } catch (e) {
        console.warn("Could not parse JSON from Gemini output, using raw text.", e);
        // Fallback to raw text for structured fields if JSON parsing fails and raw_text is the only content
        if (!parsedData.nombre_finado && !parsedData.fecha_nacimiento && !parsedData.fecha_defuncion && !parsedData.nombre_panteon) {
            // A very simple attempt to put raw text into a single field if no JSON.
            // This is a basic fallback, could be improved with more robust regex for dates/names.
            parsedData.nombre_finado = text.substring(0, 50) + (text.length > 50 ? '...' : ''); // Take first 50 chars as finado name if no other data
        }
    }

    // Populate the form fields with the (parsed or raw) data
    document.getElementById('display-nombre-finado').value = parsedData.nombre_finado;
    document.getElementById('display-fecha-nacimiento').value = parsedData.fecha_nacimiento;
    document.getElementById('display-fecha-defuncion').value = parsedData.fecha_defuncion;
    document.getElementById('display-nombre-panteon').value = parsedData.nombre_panteon;
    
    // Display geolocation if available
    if (currentGeolocation) {
        document.getElementById('display-geolocation').value = `Lat: ${currentGeolocation.latitude.toFixed(4)}, Long: ${currentGeolocation.longitude.toFixed(4)}`;
    } else {
        document.getElementById('display-geolocation').value = 'No disponible';
    }
    document.getElementById('display-raw-text').value = parsedData.raw_text;

    // Show the extracted data card
    document.getElementById('extracted-data-card').style.display = 'flex';

    // Add to internal history array (outputArray)
    outputArray.push({
        timestamp: new Date().toLocaleString(),
        geolocation: currentGeolocation,
        data: parsedData
    });

    showToast('✅ Datos listos y agregados a historial interno');
    closeResult();
}

   PASSWORD VISIBILITY TOGGLE
══════════════════════════════════════════════════════════════════ */
function togglePasswordVisibility(inputId, buttonElement) {
    const input = document.getElementById(inputId);
    const icon = buttonElement.querySelector('i');

    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}

/* ══════════════════════════════════════════════════════════════════
   FIREBASE AUTHENTICATION
══════════════════════════════════════════════════════════════════ */
async function handleAuth(isLogin, event) {
    const email = document.getElementById('auth-email').value;
    const password = document.getElementById('auth-password').value;

    if (!email || !password) {
        showToast('⚠ Por favor, ingresa email y contraseña', '#f59e0b');
        return;
    }

    const loginBtn = document.getElementById('login-btn');
    const registerBtn = document.getElementById('register-btn');
    const clickedButton = event.currentTarget; // Use currentTarget to get the button element

    // Store original text if not already stored
    if (loginBtn && !loginBtn.dataset.originalText) loginBtn.dataset.originalText = loginBtn.textContent;
    if (registerBtn && !registerBtn.dataset.originalText) registerBtn.dataset.originalText = registerBtn.textContent;

    // Disable all auth buttons and show spinner on the clicked one
    if (loginBtn) loginBtn.disabled = true;
    if (registerBtn) registerBtn.disabled = true;

    if (clickedButton && !clickedButton.querySelector('.spinner-border')) {
        clickedButton.innerHTML = `<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>${clickedButton.dataset.originalText}`;
    }

    try {
        if (isLogin) {
            await auth.signInWithEmailAndPassword(email, password);
            showToast('✅ Sesión iniciada correctamente');
        } else {
            await auth.createUserWithEmailAndPassword(email, password);
            showToast('✅ Registro exitoso. ¡Bienvenido!');
        }
    } catch (error) {
        console.error("Firebase Auth Error:", error);
        let msg = "Error de autenticación.";
        if (error.code === 'auth/email-already-in-use') {
            msg = 'El correo ya está en uso. Intenta iniciar sesión.';
        } else if (error.code === 'auth/invalid-email') {
            msg = 'Formato de correo electrónico inválido.';
        } else if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
            msg = 'Credenciales inválidas.';
        } else if (error.code === 'auth/weak-password') {
            msg = 'La contraseña debe tener al menos 6 caracteres.';
        }
        showToast(`❌ ${msg}`, '#ef4444');
    } finally {
        // Re-enable buttons and restore original text
        if (loginBtn) {
            loginBtn.disabled = false;
            loginBtn.innerHTML = loginBtn.dataset.originalText;
        }
        if (registerBtn) {
            registerBtn.disabled = false;
            registerBtn.innerHTML = registerBtn.dataset.originalText;
        }
    }
}

function logout() {
    auth.signOut().then(() => {
        showToast('✅ Sesión cerrada correctamente');
    }).catch((error) => {
        console.error("Firebase Sign Out Error:", error);
        showToast('❌ Error al cerrar sesión', '#ef4444');
    });
}


/* ══════════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════════ */
window.onload = () => {
    // Populate version text in splash screen and header
    document.getElementById('splash-version').textContent = APP_VERSION;
    document.getElementById('app-header-version').textContent = APP_VERSION;

    // Store original button texts on load
    const loginBtn = document.getElementById('login-btn');
    const registerBtn = document.getElementById('register-btn');
    if (loginBtn) loginBtn.dataset.originalText = loginBtn.textContent;
    if (registerBtn) registerBtn.dataset.originalText = registerBtn.textContent;

    // Show splash screen first
    document.getElementById('splash-screen').style.display = 'flex';
    setTimeout(() => {
        document.getElementById('splash-screen').classList.add('hidden');
        setTimeout(() => {
            document.getElementById('splash-screen').style.display = 'none';
            // Only show auth screen if user is not already logged in (Firebase state listener handles this)
            if (!auth.currentUser) {
                document.getElementById('auth-screen').style.display = 'flex'; 
            }
        }, 500); // Wait for transition
    }, 2500); // Show splash for 2.5 seconds

    // Firebase Auth State Listener
    auth.onAuthStateChanged((user) => {
        if (user) {
            // User is signed in
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('logout-btn').style.display = 'block'; // Show logout button in main app
            
            // Check API key after main app is visible
            if (!isGeminiKeySet()) {
                changeGeminiKey(); // This will display the modal
                showToast('⚠ Ingresa tu API Key de Gemini para escanear.', '#f59e0b', 5000); // Longer toast for importance
            }
        } else {
            // User is signed out
            document.getElementById('main-app').style.display = 'none';
            closeGeminiKeyModal(); // Hide key modal if user logs out
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('logout-btn').style.display = 'none';
        }
    });
};
